name: Gerar APK e publicar atualização definitiva

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: buildmaster-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build, testes, assinatura e publicação verificada
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Conferir configuração obrigatória
        env:
          ANDROID_SIGNING_BUNDLE: ${{ secrets.ANDROID_SIGNING_BUNDLE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          test -n "$ANDROID_SIGNING_BUNDLE" || { echo "::error::ANDROID_SIGNING_BUNDLE é obrigatório. Um APK sem a assinatura permanente não pode ser publicado como atualização."; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "::error::A Variable NEXT_PUBLIC_SUPABASE_URL não foi configurada."; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || { echo "::error::A Variable NEXT_PUBLIC_SUPABASE_ANON_KEY não foi configurada."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_URL" =~ ^https://[a-z0-9-]+\.supabase\.co/?$ ]] || { echo "::error::NEXT_PUBLIC_SUPABASE_URL não é uma URL válida do Supabase."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_URL" != *example* ]] || { echo "::error::A URL ainda está com o valor de exemplo."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_ANON_KEY" == sb_publishable_* || "$NEXT_PUBLIC_SUPABASE_ANON_KEY" == eyJ* ]] || { echo "::error::Use a Publishable key ou a chave anon pública."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_ANON_KEY" != *test* ]] || { echo "::error::A chave ainda está com valor de teste."; exit 1; }
          echo "Assinatura permanente e Supabase confirmados."

      - name: Calcular versão Android monotônica e ativo imutável
        env:
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          GIT_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import os
          import json, pathlib
          version = str(json.loads(pathlib.Path('package.json').read_text(encoding='utf-8'))['version'])
          major, minor, patch = [int(part) for part in version.split('.')[:3]]
          run = max(1, int(os.environ['RUN_NUMBER'])) % 10000
          attempt = max(1, int(os.environ['RUN_ATTEMPT']))
          version_code = major * 50_000_000 + minor * 100_000 + patch * 10_000 + run
          # O token do nome inclui a tentativa. Assim, "Re-run jobs" nunca sobrescreve
          # um APK que já pode estar em cache no GitHub ou no aparelho.
          asset_token = f'{version_code}{attempt:02d}'
          short_sha = os.environ['GIT_SHA'][:8]
          asset = f'BuildMaster-Elite-Tatico-v{version}-{asset_token}-{short_sha}.apk'
          publication_id = f'{os.environ["RUN_ID"]}-{attempt}-{short_sha}'
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as handle:
              handle.write(f'BUILDMASTER_VERSION={version}\n')
              handle.write(f'ANDROID_VERSION_CODE={version_code}\n')
              handle.write(f'APK_ASSET_NAME={asset}\n')
              handle.write(f'APK_PUBLICATION_ID={publication_id}\n')
          print(f'Versão {version}; versionCode {version_code}; tentativa {attempt}; asset imutável {asset}')
          PY

      - name: Exibir versões do ambiente
        run: |
          node --version
          npm --version
          java -version

      - name: Garantir registro público do npm
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set replace-registry-host always
          node scripts/verify-public-npm-registry.mjs
          test "$(npm config get registry)" = "https://registry.npmjs.org/"

      - name: Instalar dependências travadas
        timeout-minutes: 30
        env:
          npm_config_registry: https://registry.npmjs.org/
          npm_config_replace_registry_host: always
          npm_config_fetch_retries: '4'
          npm_config_fetch_retry_factor: '2'
          npm_config_fetch_retry_mintimeout: '15000'
          npm_config_fetch_retry_maxtimeout: '120000'
          npm_config_fetch_timeout: '300000'
        run: |
          set -e
          for tentativa in 1 2 3; do
            echo "Tentativa $tentativa de 3 para instalar dependências pelo registro público..."
            if npm ci --no-audit --no-fund --loglevel=info; then
              exit 0
            fi
            if [ "$tentativa" -lt 3 ]; then
              espera=$((tentativa * 20))
              echo "Falha temporária de rede. Nova tentativa em ${espera}s."
              sleep "$espera"
            fi
          done
          echo "::error::Não foi possível instalar as dependências após 3 tentativas no registro público do npm."
          exit 1

      - name: Validar TypeScript
        timeout-minutes: 6
        run: npm run typecheck

      - name: Rodar testes do motor
        timeout-minutes: 16
        run: npm run test:all

      - name: Preparar exportação estática para APK
        run: rm -rf out android .buildmaster-static-disabled dist-apk signing verify-release

      - name: Gerar app web embutido
        timeout-minutes: 12
        env:
          BUILDMASTER_ANDROID_STATIC: '1'
          NEXT_PUBLIC_BUILDMASTER_BUILD_ID: ${{ github.sha }}
          NEXT_PUBLIC_BUILDMASTER_VERSION: ${{ env.BUILDMASTER_VERSION }}
          NEXT_PUBLIC_BUILDMASTER_NATIVE_VERSION: ${{ env.BUILDMASTER_VERSION }}
          NEXT_PUBLIC_BUILDMASTER_UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/buildmaster-latest/update-manifest.json
          NEXT_PUBLIC_BUILDMASTER_CLOUD_API_URL: ${{ vars.BUILDMASTER_CLOUD_API_URL || 'https://buildmaster-ai-git-main-buildmaster-ai.vercel.app/api/cloud/fichas' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BUILDMASTER_ALLOW_LOCAL_FALLBACK: ${{ vars.NEXT_PUBLIC_BUILDMASTER_ALLOW_LOCAL_FALLBACK || '0' }}
        run: npm run apk:build-web

      - name: Confirmar configuração real dentro do app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          ! grep -RqsF 'https://example.supabase.co' out || { echo '::error::O build ainda contém a URL de teste.'; exit 1; }
          ! grep -RqsF 'sb_publishable_test' out || { echo '::error::O build ainda contém a chave de teste.'; exit 1; }
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_URL" out || { echo '::error::A URL real do Supabase não entrou no app.'; exit 1; }
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_ANON_KEY" out || { echo '::error::A chave pública real não entrou no app.'; exit 1; }
          grep -RqsF 'update-manifest.json' out || { echo '::error::O canal de atualização não entrou no build.'; exit 1; }

      - name: Criar projeto Android
        timeout-minutes: 5
        run: npx --no-install cap add android

      - name: Instalar Keystore, identidade e atualizador nativo
        run: node scripts/install-android-security-plugin.mjs

      - name: Atualizar versão interna do Android
        run: |
          python - <<'PY'
          import os, pathlib, re
          candidates = [pathlib.Path('android/app/build.gradle'), pathlib.Path('android/app/build.gradle.kts')]
          target = next((item for item in candidates if item.exists()), None)
          if target is None:
              raise SystemExit('Arquivo Gradle do aplicativo não encontrado.')
          text = target.read_text(encoding='utf-8')
          code = int(os.environ['ANDROID_VERSION_CODE'])
          version = os.environ['BUILDMASTER_VERSION']
          text, count_code = re.subn(r'versionCode\s*[= ]\s*\d+', f'versionCode {code}', text, count=1)
          text, count_name = re.subn(r'versionName\s*[= ]\s*["\'][^"\']+["\']', f'versionName "{version}"', text, count=1)
          if not count_code or not count_name:
              raise SystemExit('versionCode/versionName não encontrados no Gradle.')
          target.write_text(text, encoding='utf-8')
          print(f'Android versionCode={code}; versionName={version}')
          PY

      - name: Configurar cache do Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Sincronizar arquivos dentro do APK
        timeout-minutes: 5
        run: npx --no-install cap sync android

      - name: Confirmar atualizador nativo completo
        run: |
          PLUGIN=android/app/src/main/java/com/buildmaster/elitetatico/BuildMasterSecurityPlugin.java
          test -f "$PLUGIN" || { echo '::error::Plugin nativo ausente.'; exit 1; }
          grep -qF 'AndroidKeyStore' "$PLUGIN" || { echo '::error::Android Keystore ausente.'; exit 1; }
          grep -qF 'getAppInstallInfo' "$PLUGIN" || { echo '::error::Leitura de versionCode instalada ausente.'; exit 1; }
          grep -qF 'canRequestPackageInstalls' "$PLUGIN" || { echo '::error::Fluxo de permissão de instalação ausente.'; exit 1; }
          grep -qF 'apkDownloadProgress' "$PLUGIN" || { echo '::error::Progresso de download ausente.'; exit 1; }
          grep -qF 'hasSigningCertificate' "$PLUGIN" || { echo '::error::Validação da assinatura do APK ausente.'; exit 1; }
          grep -qF 'getPackageArchiveInfo' "$PLUGIN" || { echo '::error::Validação do pacote baixado ausente.'; exit 1; }
          grep -qF 'SHA-256 do APK não confere' "$PLUGIN" || { echo '::error::Validação SHA-256 ausente.'; exit 1; }
          grep -RqsF 'REQUEST_INSTALL_PACKAGES' android/app/src/main/AndroidManifest.xml || { echo '::error::Permissão controlada de instalação ausente.'; exit 1; }
          grep -RqsF 'androidx.core.content.FileProvider' android/app/src/main/AndroidManifest.xml || { echo '::error::FileProvider seguro ausente.'; exit 1; }
          grep -RqsF 'usesCleartextTraffic="false"' android/app/src/main/AndroidManifest.xml || { echo '::error::Tráfego HTTP inseguro não foi bloqueado.'; exit 1; }
          grep -RqsF 'allowBackup="false"' android/app/src/main/AndroidManifest.xml || { echo '::error::Backup Android não autorizado ainda está ativo.'; exit 1; }

      - name: Confirmar Supabase nos arquivos Android
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_URL" android/app/src/main/assets/public || { echo '::error::A URL real não foi copiada para o APK.'; exit 1; }
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_ANON_KEY" android/app/src/main/assets/public || { echo '::error::A chave real não foi copiada para o APK.'; exit 1; }

      - name: Preparar chave permanente
        env:
          ANDROID_SIGNING_BUNDLE: ${{ secrets.ANDROID_SIGNING_BUNDLE }}
        run: |
          python - <<'PY'
          import base64, json, os, pathlib
          try:
              bundle = json.loads(os.environ['ANDROID_SIGNING_BUNDLE'])
              encoded = str(bundle['keystoreBase64'])
              password = str(bundle['password'])
              if len(password) < 12:
                  raise ValueError('senha muito curta')
              raw = base64.b64decode(encoded, validate=True)
          except Exception as exc:
              raise SystemExit(f'ANDROID_SIGNING_BUNDLE inválido: {exc}')
          path = pathlib.Path('signing/buildmaster-release.keystore')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_bytes(raw)
          os.chmod(path, 0o600)
          print(f'::add-mask::{password}')
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as handle:
              handle.write(f'ANDROID_KEYSTORE_PATH={path.resolve()}\n')
              handle.write(f'ANDROID_KEYSTORE_PASSWORD={password}\n')
              handle.write('ANDROID_KEY_ALIAS=buildmaster\n')
          PY

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK release
        timeout-minutes: 16
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease

      - name: Alinhar, assinar e validar APK oficial
        run: |
          mkdir -p dist-apk
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release -type f -name '*-unsigned.apk' | head -n 1)
          test -f "$UNSIGNED_APK" || { echo "::error::APK release sem assinatura não encontrado."; exit 1; }
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          AAPT=$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)
          test -x "$ZIPALIGN" && test -x "$APKSIGNER" && test -x "$AAPT"
          "$ZIPALIGN" -p -f 4 "$UNSIGNED_APK" dist-apk/BuildMaster-aligned.apk
          "$APKSIGNER" sign \
            --ks "$ANDROID_KEYSTORE_PATH" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass env:ANDROID_KEYSTORE_PASSWORD \
            --out "dist-apk/$APK_ASSET_NAME" \
            dist-apk/BuildMaster-aligned.apk
          rm -f dist-apk/BuildMaster-aligned.apk
          "$APKSIGNER" verify --verbose --print-certs "dist-apk/$APK_ASSET_NAME" | tee dist-apk/signing-report.txt
          BADGING=$("$AAPT" dump badging "dist-apk/$APK_ASSET_NAME" | head -n 1)
          echo "$BADGING"
          echo "$BADGING" | grep -q "package: name='com.buildmaster.elitetatico'" || { echo '::error::appId incorreto no APK.'; exit 1; }
          echo "$BADGING" | grep -q "versionCode='$ANDROID_VERSION_CODE'" || { echo '::error::versionCode incorreto no APK.'; exit 1; }
          echo "$BADGING" | grep -q "versionName='$BUILDMASTER_VERSION'" || { echo '::error::versionName incorreto no APK.'; exit 1; }
          cp "dist-apk/$APK_ASSET_NAME" "dist-apk/BuildMaster-Elite-Tatico-v$BUILDMASTER_VERSION.apk"
          cp "dist-apk/$APK_ASSET_NAME" "dist-apk/BuildMaster-Elite-Tatico-latest.apk"

      - name: Preparar manifesto da atualização
        run: |
          python - <<'PY'
          import datetime, hashlib, json, os, pathlib
          asset_name = os.environ['APK_ASSET_NAME']
          apk = pathlib.Path('dist-apk') / asset_name
          repo = os.environ['GITHUB_REPOSITORY']
          manifest = {
            'appId': 'com.buildmaster.elitetatico',
            'version': os.environ['BUILDMASTER_VERSION'],
            'versionCode': int(os.environ['ANDROID_VERSION_CODE']),
            'buildId': os.environ['GITHUB_SHA'],
            'publishedAt': datetime.datetime.now(datetime.timezone.utc).isoformat(),
            'channel': 'stable',
            'updateType': 'apk',
            'apkUrl': f'https://github.com/{repo}/releases/download/buildmaster-latest/{asset_name}?publication={os.environ["APK_PUBLICATION_ID"]}&code={os.environ["ANDROID_VERSION_CODE"]}',
            'notes': [
              'Print Único Pro adaptativo separa nível, GER, posição, estilo, pontos, atributos, habilidades e arte da carta.',
              'Alinhamento pela área útil da tela, OCR reutilizável, cache por hash, fila local e cancelamento.',
              'Nível validado por rótulo, região, alternativas e coerência com GER e pontos visíveis.',
              'Auditoria visual com recortes, histórico de confiança e memória de correções confirmadas.',
              'Design System premium, banco estruturado, diagnóstico seguro e inteligência integrada.',
              'Atualização usa APK exclusivo por execução e tentativa, sem sobrescrever arquivo que possa estar em cache.',
              'O app refaz a validação antes de instalar e tenta novamente com URL sem cache quando a rede entrega arquivo incompleto.'
            ],
            'mandatory': True,
            'minNativeVersion': '26.75.0',
            'checksum': hashlib.sha256(apk.read_bytes()).hexdigest(),
            'sizeBytes': apk.stat().st_size
          }
          pathlib.Path('dist-apk/update-manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          cat > dist-apk/RELEASE_NOTES.md <<NOTES
          ## BuildMaster Elite Tático v$BUILDMASTER_VERSION — Reconstrução Completa

          - Print Único Pro adaptativo com separação rígida entre nível, GER, pontos e atributos.
          - OCR reutilizável, cache por hash, fila local, cancelamento e limites de memória.
          - Evidência visual por campo, histórico de confiança e memória de correções confirmadas.
          - Banco local estruturado com cartas, fichas, formações, partidas e miniaturas indexadas.
          - Design System premium, acessibilidade, diagnóstico seguro e módulos carregados sob demanda.
          - Detector de lacunas do elenco, rastro dos pontos, planos ligados ao banco e cartão compartilhável.
          - Atualizador definitivo, assinatura permanente e teste pós-publicação preservados.
          NOTES

      - name: Enviar APK e manifesto como artefato
        uses: actions/upload-artifact@v4
        with:
          name: BuildMaster-Elite-Tatico-v${{ env.BUILDMASTER_VERSION }}-APK-e-Manifesto
          path: |
            dist-apk/BuildMaster-Elite-Tatico-v${{ env.BUILDMASTER_VERSION }}.apk
            dist-apk/${{ env.APK_ASSET_NAME }}
            dist-apk/BuildMaster-Elite-Tatico-latest.apk
            dist-apk/update-manifest.json
            dist-apk/signing-report.txt
          if-no-files-found: error
          retention-days: 14

      - name: Preparar release estável sem cancelar publicação anterior
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f buildmaster-latest "$GITHUB_SHA"
          git push origin refs/tags/buildmaster-latest --force
          if gh release view buildmaster-latest >/dev/null 2>&1; then
            gh release edit buildmaster-latest \
              --title "BuildMaster Elite Tático v$BUILDMASTER_VERSION — Atualização verificada" \
              --notes-file dist-apk/RELEASE_NOTES.md
          else
            gh release create buildmaster-latest \
              --verify-tag \
              --title "BuildMaster Elite Tático v$BUILDMASTER_VERSION — Atualização verificada" \
              --notes-file dist-apk/RELEASE_NOTES.md
          fi

      - name: Publicar APK imutável da tentativa
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sem --clobber: um nome imutável jamais pode trocar de conteúdo.
          gh release upload buildmaster-latest "dist-apk/$APK_ASSET_NAME"

      - name: Validar propagação pública antes do manifesto
        run: |
          mkdir -p verify-release
          IMMUTABLE_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/buildmaster-latest/$APK_ASSET_NAME?publication=$APK_PUBLICATION_ID&preflight=$(date +%s)"
          EXPECTED_SHA=$(sha256sum "dist-apk/$APK_ASSET_NAME" | awk '{print $1}')
          EXPECTED_SIZE=$(stat -c%s "dist-apk/$APK_ASSET_NAME")
          validated=0
          for attempt in 1 2 3 4 5 6 7 8; do
            rm -f verify-release/preflight.apk
            if curl --fail --silent --show-error --location --retry 3 --retry-all-errors \
              --header 'Accept-Encoding: identity' --connect-timeout 30 --max-time 300 \
              "$IMMUTABLE_URL&attempt=$attempt" -o verify-release/preflight.apk; then
              ACTUAL_SHA=$(sha256sum verify-release/preflight.apk | awk '{print $1}')
              ACTUAL_SIZE=$(stat -c%s verify-release/preflight.apk)
              if [ "$ACTUAL_SHA" = "$EXPECTED_SHA" ] && [ "$ACTUAL_SIZE" = "$EXPECTED_SIZE" ]; then
                validated=1
                break
              fi
              echo "Propagação ainda divergente na tentativa $attempt: size=$ACTUAL_SIZE sha=$ACTUAL_SHA"
            fi
            sleep $((attempt * 8))
          done
          test "$validated" = 1 || { echo '::error::O APK imutável não ficou disponível publicamente com os mesmos bytes. Manifesto não será publicado.'; exit 1; }

      - name: Publicar atalhos e manifesto por último
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload buildmaster-latest dist-apk/BuildMaster-Elite-Tatico-latest.apk --clobber
          gh release upload buildmaster-latest dist-apk/signing-report.txt --clobber
          gh release upload buildmaster-latest dist-apk/update-manifest.json --clobber

      - name: Verificar release publicada de ponta a ponta
        run: |
          MANIFEST_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/buildmaster-latest/update-manifest.json?publication=$APK_PUBLICATION_ID&verify=$(date +%s)"
          for attempt in 1 2 3 4 5 6 7 8; do
            rm -f verify-release/update-manifest.json
            if curl --fail --silent --show-error --location --retry 3 --retry-all-errors \
              --header 'Accept-Encoding: identity' --connect-timeout 20 --max-time 90 \
              "$MANIFEST_URL&attempt=$attempt" -o verify-release/update-manifest.json; then
              if python - <<'PY'
          import json, os, pathlib, sys
          path = pathlib.Path('verify-release/update-manifest.json')
          try:
              manifest = json.loads(path.read_text(encoding='utf-8'))
              assert manifest['version'] == os.environ['BUILDMASTER_VERSION']
              assert manifest['versionCode'] == int(os.environ['ANDROID_VERSION_CODE'])
              assert manifest['buildId'] == os.environ['GITHUB_SHA']
              assert f'/{os.environ["APK_ASSET_NAME"]}?' in manifest['apkUrl']
              assert os.environ['APK_PUBLICATION_ID'] in manifest['apkUrl']
          except Exception as exc:
              print(f'Manifesto ainda não propagado: {exc}')
              sys.exit(1)
          pathlib.Path('verify-release/apk-url.txt').write_text(manifest['apkUrl'], encoding='utf-8')
          pathlib.Path('verify-release/checksum.txt').write_text(manifest['checksum'], encoding='utf-8')
          pathlib.Path('verify-release/size.txt').write_text(str(manifest['sizeBytes']), encoding='utf-8')
          PY
              then break; fi
            fi
            sleep $((attempt * 8))
          done
          test -s verify-release/apk-url.txt || { echo '::error::Manifesto novo não ficou disponível publicamente.'; exit 1; }
          APK_URL=$(cat verify-release/apk-url.txt)
          curl --fail --silent --show-error --location --retry 8 --retry-all-errors \
            --header 'Accept-Encoding: identity' --connect-timeout 30 --max-time 300 \
            "$APK_URL&verify=$APK_PUBLICATION_ID-$(date +%s)" -o verify-release/released.apk
          ACTUAL_SHA=$(sha256sum verify-release/released.apk | awk '{print $1}')
          EXPECTED_SHA=$(cat verify-release/checksum.txt)
          test "$ACTUAL_SHA" = "$EXPECTED_SHA" || { echo '::error::Checksum do APK publicado não confere com o manifesto.'; exit 1; }
          test "$(stat -c%s verify-release/released.apk)" = "$(cat verify-release/size.txt)" || { echo '::error::Tamanho do APK publicado não confere.'; exit 1; }
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          AAPT=$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)
          "$APKSIGNER" verify --verbose --print-certs verify-release/released.apk
          "$AAPT" dump badging verify-release/released.apk | head -n 1 | grep -q "versionCode='$ANDROID_VERSION_CODE'" || { echo '::error::APK publicado tem versionCode incorreto.'; exit 1; }
          echo 'Release verificada: ativo imutável, manifesto, checksum, tamanho, assinatura e versionCode corretos.'
