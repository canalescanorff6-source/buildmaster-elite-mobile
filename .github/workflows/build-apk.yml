name: Gerar APK React Native v1.4 OFFLINE

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Mostrar versão do projeto
        run: |
          node -e "const p=require('./package.json'); console.log(p.name, p.version); if(!p.name.includes('v1-4')){ console.error('ERRO: versão antiga no repositório. Apague os arquivos antigos e envie a v1.4.'); process.exit(1); }"

      - name: Instalar dependências
        run: npm install --registry=https://registry.npmjs.org/

      - name: Corrigir tsconfig antigo
        run: npm run fix:tsconfig

      - name: Conferir TypeScript
        run: npm run typecheck

      - name: Gerar projeto Android nativo
        run: npx expo prebuild --platform android --clean --no-install

      - name: Embutir JavaScript no APK
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res --reset-cache
          ls -lh android/app/src/main/assets/index.android.bundle

      - name: Gerar APK instalável sem Metro
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildmaster-elite-mobile-v1-4-apk-offline-debug
          path: android/app/build/outputs/apk/debug/*.apk
