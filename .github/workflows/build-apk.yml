name: Gerar APK Android Fiel v24.40 Simulador Desempenho Premium

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    name: Build APK fiel com Analise Profunda
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependências
        run: npm install --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Validar TypeScript
        run: npm run typecheck

      - name: Rodar testes do motor
        run: npm run test:all

      - name: Preparar exportação estática para APK
        run: |
          rm -rf out android
          if [ -d src/app/api ]; then
            mv src/app/api src/app/_api_desativada_no_apk
          fi
          if [ -f middleware.ts ]; then
            mv middleware.ts middleware.desativado-no-apk.ts
          fi

      - name: Gerar app web embutido
        env:
          BUILDMASTER_ANDROID_STATIC: '1'
          NEXT_PUBLIC_BUILDMASTER_CLOUD_API_URL: ${{ vars.BUILDMASTER_CLOUD_API_URL || 'https://buildmaster-ai-git-main-buildmaster-ai.vercel.app/api/cloud/fichas' }}
        run: npm run build

      - name: Criar projeto Android
        run: npx cap add android

      - name: Sincronizar arquivos dentro do APK
        run: npx cap sync android

      - name: Gerar APK instalável
        run: cd android && ./gradlew assembleDebug

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: BuildMaster-Elite-Tatico-v24-37-Escolha-Soberana-APK-Fiel
          path: android/app/build/outputs/apk/debug/app-debug.apk
