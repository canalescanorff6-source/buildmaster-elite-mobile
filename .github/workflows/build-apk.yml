name: Gerar APK e publicar atualização segura v26.76

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: buildmaster-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build, testes, APK assinado e atualização
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Conferir configuração obrigatória
        id: signing
        env:
          ANDROID_SIGNING_BUNDLE: ${{ secrets.ANDROID_SIGNING_BUNDLE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$ANDROID_SIGNING_BUNDLE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Assinatura permanente disponível: o APK poderá ser publicado como atualização."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_SIGNING_BUNDLE ainda não foi criado. Será gerado um APK de teste instalável, sem publicar atualização automática."
          fi
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "::error::A Variable NEXT_PUBLIC_SUPABASE_URL não foi configurada."; exit 1; }
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || { echo "::error::A Variable NEXT_PUBLIC_SUPABASE_ANON_KEY não foi configurada."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_URL" =~ ^https://[a-z0-9-]+\.supabase\.co/?$ ]] || { echo "::error::NEXT_PUBLIC_SUPABASE_URL não é uma URL válida do Supabase."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_URL" != *example* ]] || { echo "::error::A URL ainda está com o valor de exemplo."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_ANON_KEY" == sb_publishable_* || "$NEXT_PUBLIC_SUPABASE_ANON_KEY" == eyJ* ]] || { echo "::error::Use a Publishable key ou a chave anon pública."; exit 1; }
          [[ "$NEXT_PUBLIC_SUPABASE_ANON_KEY" != *test* ]] || { echo "::error::A chave ainda está com valor de teste."; exit 1; }

      - name: Exibir versões do ambiente
        run: |
          node --version
          npm --version
          java -version

      - name: Instalar dependências travadas
        timeout-minutes: 25
        env:
          npm_config_fetch_retries: '3'
          npm_config_fetch_retry_mintimeout: '10000'
          npm_config_fetch_retry_maxtimeout: '60000'
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund --loglevel=info

      - name: Validar TypeScript
        timeout-minutes: 6
        run: npm run typecheck

      - name: Rodar testes do motor
        timeout-minutes: 14
        run: npm run test:all

      - name: Preparar exportação estática para APK
        run: rm -rf out android .buildmaster-static-disabled dist-apk signing

      - name: Gerar app web embutido
        timeout-minutes: 12
        env:
          BUILDMASTER_ANDROID_STATIC: '1'
          NEXT_PUBLIC_BUILDMASTER_BUILD_ID: ${{ github.sha }}
          NEXT_PUBLIC_BUILDMASTER_UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/buildmaster-latest/update-manifest.json
          NEXT_PUBLIC_BUILDMASTER_CLOUD_API_URL: ${{ vars.BUILDMASTER_CLOUD_API_URL || 'https://buildmaster-ai-git-main-buildmaster-ai.vercel.app/api/cloud/fichas' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BUILDMASTER_ALLOW_LOCAL_FALLBACK: ${{ vars.NEXT_PUBLIC_BUILDMASTER_ALLOW_LOCAL_FALLBACK || '0' }}
        run: npm run apk:build-web

      - name: Confirmar Supabase real no app gerado
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          ! grep -RqsF 'https://example.supabase.co' out || { echo '::error::O build ainda contém a URL de teste.'; exit 1; }
          ! grep -RqsF 'sb_publishable_test' out || { echo '::error::O build ainda contém a chave de teste.'; exit 1; }
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_URL" out || { echo '::error::A URL real do Supabase não entrou no app.'; exit 1; }
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_ANON_KEY" out || { echo '::error::A chave pública real não entrou no app.'; exit 1; }
          echo 'Supabase real confirmado dentro do app web.'

      - name: Criar projeto Android
        timeout-minutes: 5
        run: npx --no-install cap add android

      - name: Instalar armazenamento seguro, identidade do aparelho e instalador verificado
        run: node scripts/install-android-security-plugin.mjs

      - name: Atualizar versão interna do Android
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          candidates = [pathlib.Path('android/app/build.gradle'), pathlib.Path('android/app/build.gradle.kts')]
          target = next((item for item in candidates if item.exists()), None)
          if target is None:
              raise SystemExit('Arquivo Gradle do aplicativo não encontrado.')
          text = target.read_text(encoding='utf-8')
          code = 267600 + max(1, int(os.environ['ANDROID_VERSION_CODE']))
          text, count_code = re.subn(r'versionCode\s*[= ]\s*\d+', f'versionCode {code}', text, count=1)
          text, count_name = re.subn(r'versionName\s*[= ]\s*["\'][^"\']+["\']', 'versionName "26.76.0"', text, count=1)
          if not count_code or not count_name:
              raise SystemExit('versionCode/versionName não encontrados no Gradle.')
          target.write_text(text, encoding='utf-8')
          print(f'Android versionCode={code}; versionName=26.76.0')
          PY

      - name: Configurar cache do Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Sincronizar arquivos dentro do APK
        timeout-minutes: 5
        run: npx --no-install cap sync android

      - name: Confirmar proteções nativas de segurança
        run: |
          test -f android/app/src/main/java/com/buildmaster/elitetatico/BuildMasterSecurityPlugin.java || { echo '::error::Plugin nativo de segurança ausente.'; exit 1; }
          grep -RqsF 'AndroidKeyStore' android/app/src/main/java/com/buildmaster/elitetatico/BuildMasterSecurityPlugin.java || { echo '::error::Android Keystore não foi configurado.'; exit 1; }
          grep -RqsF 'REQUEST_INSTALL_PACKAGES' android/app/src/main/AndroidManifest.xml || { echo '::error::Permissão controlada de instalação ausente.'; exit 1; }
          grep -RqsF 'androidx.core.content.FileProvider' android/app/src/main/AndroidManifest.xml || { echo '::error::FileProvider seguro ausente.'; exit 1; }
          grep -RqsF 'usesCleartextTraffic="false"' android/app/src/main/AndroidManifest.xml || { echo '::error::Tráfego HTTP inseguro não foi bloqueado.'; exit 1; }
          grep -RqsF 'allowBackup="false"' android/app/src/main/AndroidManifest.xml || { echo '::error::Backup Android não autorizado ainda está ativo.'; exit 1; }
          grep -RqsF '@xml/buildmaster_file_paths' android/app/src/main/AndroidManifest.xml || { echo '::error::FileProvider não está limitado ao cache verificado.'; exit 1; }
          echo 'Keystore, identidade criptográfica e instalador verificado confirmados.'

      - name: Confirmar Supabase dentro dos arquivos do Android
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_URL" android/app/src/main/assets/public || { echo '::error::A URL real não foi copiada para o APK.'; exit 1; }
          grep -RqsF "$NEXT_PUBLIC_SUPABASE_ANON_KEY" android/app/src/main/assets/public || { echo '::error::A chave real não foi copiada para o APK.'; exit 1; }
          echo 'Supabase real confirmado nos arquivos que serão empacotados no APK.'

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK release sem assinatura
        if: steps.signing.outputs.enabled == 'true'
        timeout-minutes: 15
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease

      - name: Gerar APK de teste instalável
        if: steps.signing.outputs.enabled != 'true'
        timeout-minutes: 15
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Preparar chave permanente
        if: steps.signing.outputs.enabled == 'true'
        env:
          ANDROID_SIGNING_BUNDLE: ${{ secrets.ANDROID_SIGNING_BUNDLE }}
        run: |
          python - <<'PY'
          import base64, json, os, pathlib
          try:
              bundle = json.loads(os.environ['ANDROID_SIGNING_BUNDLE'])
              encoded = str(bundle['keystoreBase64'])
              password = str(bundle['password'])
              if len(password) < 12:
                  raise ValueError('senha muito curta')
              raw = base64.b64decode(encoded, validate=True)
          except Exception as exc:
              raise SystemExit(f'ANDROID_SIGNING_BUNDLE inválido: {exc}')
          path = pathlib.Path('signing/buildmaster-release.keystore')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_bytes(raw)
          os.chmod(path, 0o600)
          print(f'::add-mask::{password}')
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as handle:
              handle.write(f'ANDROID_KEYSTORE_PATH={path.resolve()}\n')
              handle.write(f'ANDROID_KEYSTORE_PASSWORD={password}\n')
              handle.write('ANDROID_KEY_ALIAS=buildmaster\n')
          print('Chave permanente carregada com segurança.')
          PY

      - name: Alinhar e assinar APK de produção
        if: steps.signing.outputs.enabled == 'true'
        run: |
          mkdir -p dist-apk
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release -type f -name '*-unsigned.apk' | head -n 1)
          test -f "$UNSIGNED_APK" || { echo "::error::APK release sem assinatura não encontrado."; exit 1; }
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          AAPT=$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)
          test -x "$ZIPALIGN" && test -x "$APKSIGNER" && test -x "$AAPT"
          "$ZIPALIGN" -p -f 4 "$UNSIGNED_APK" dist-apk/BuildMaster-Elite-Tatico-aligned.apk
          "$APKSIGNER" sign \
            --ks "$ANDROID_KEYSTORE_PATH" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass env:ANDROID_KEYSTORE_PASSWORD \
            --out dist-apk/BuildMaster-Elite-Tatico-latest.apk \
            dist-apk/BuildMaster-Elite-Tatico-aligned.apk
          rm -f dist-apk/BuildMaster-Elite-Tatico-aligned.apk
          "$APKSIGNER" verify --verbose --print-certs dist-apk/BuildMaster-Elite-Tatico-latest.apk
          "$AAPT" dump badging dist-apk/BuildMaster-Elite-Tatico-latest.apk | head -n 3
          cp dist-apk/BuildMaster-Elite-Tatico-latest.apk dist-apk/BuildMaster-Elite-Tatico-v26.76.apk

      - name: Preparar APK de teste sem assinatura permanente
        if: steps.signing.outputs.enabled != 'true'
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk dist-apk/BuildMaster-Elite-Tatico-latest.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk dist-apk/BuildMaster-Elite-Tatico-v26.76.apk
          echo "APK de teste preparado. Para atualização automática por cima, configure ANDROID_SIGNING_BUNDLE depois."

      - name: Preparar manifesto e notas da atualização
        env:
          VERSION: '26.76.0'
        run: |
          python - <<'PY'
          import datetime, hashlib, json, os, pathlib
          apk = pathlib.Path('dist-apk/BuildMaster-Elite-Tatico-latest.apk')
          repo = os.environ['GITHUB_REPOSITORY']
          manifest = {
            'appId': 'com.buildmaster.elitetatico',
            'version': os.environ['VERSION'],
            'buildId': os.environ['GITHUB_SHA'],
            'versionCode': 267600 + int(os.environ.get('GITHUB_RUN_NUMBER', '1')),
            'publishedAt': datetime.datetime.now(datetime.timezone.utc).isoformat(),
            'channel': 'stable',
            'updateType': 'apk',
            'apkUrl': f'https://github.com/{repo}/releases/download/buildmaster-latest/BuildMaster-Elite-Tatico-latest.apk',
            'notes': [
              'APKs antigos bloqueados pelo servidor após a ativação da versão mínima.',
              'MFA obrigatório para abrir o painel administrativo.',
              'Tokens protegidos pelo Android Keystore e aparelho identificado por chave criptográfica.',
              'Atualização com URL oficial fixa e verificação SHA-256 antes da instalação.',
              'Backup criptografado, período offline reduzido e rate limit administrativo.'
            ],
            'mandatory': True,
            'minNativeVersion': '26.75.0',
            'checksum': hashlib.sha256(apk.read_bytes()).hexdigest()
          }
          pathlib.Path('dist-apk/update-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          cat > dist-apk/RELEASE_NOTES.md <<'NOTES'
          ## BuildMaster Elite Tático v26.76

          - Bloqueio de APKs abaixo da versão mínima no servidor.
          - MFA obrigatório para ações administrativas.
          - Tokens protegidos pelo Android Keystore.
          - Identidade criptográfica do aparelho e proteção contra clonagem simples.
          - Atualização por canal oficial fixo, com verificação SHA-256.
          - Backup AES-256, período offline reduzido e rate limit administrativo.

          Instale esta versão antes de ativar o bloqueio de versões antigas no Supabase.
          NOTES

      - name: Enviar APK como artefato do workflow
        uses: actions/upload-artifact@v4
        with:
          name: BuildMaster-Elite-Tatico-v26.76-APK-e-Manifesto
          path: |
            dist-apk/BuildMaster-Elite-Tatico-v26.76.apk
            dist-apk/update-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Publicar atualização estável sem apagar a última versão antes da hora
        if: steps.signing.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f buildmaster-latest "$GITHUB_SHA"
          git push origin refs/tags/buildmaster-latest --force
          if gh release view buildmaster-latest >/dev/null 2>&1; then
            gh release edit buildmaster-latest \
              --title "BuildMaster Elite Tático v26.76 — Ficha Studio" \
              --notes-file dist-apk/RELEASE_NOTES.md
            gh release upload buildmaster-latest dist-apk/BuildMaster-Elite-Tatico-latest.apk --clobber
            gh release upload buildmaster-latest dist-apk/update-manifest.json --clobber
          else
            gh release create buildmaster-latest \
              --verify-tag \
              --title "BuildMaster Elite Tático v26.76 — Ficha Studio" \
              --notes-file dist-apk/RELEASE_NOTES.md \
              dist-apk/BuildMaster-Elite-Tatico-latest.apk \
              dist-apk/update-manifest.json
          fi
