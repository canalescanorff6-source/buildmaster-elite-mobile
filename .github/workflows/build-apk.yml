name: Gerar APK Android Fiel v25.72 Lote 14 Cofre e Usabilidade

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: buildmaster-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK Fiel v25.72
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Exibir versoes do ambiente
        run: |
          node --version
          npm --version
          java -version

      - name: Instalar dependencias travadas
        timeout-minutes: 25
        env:
          npm_config_fetch_retries: '3'
          npm_config_fetch_retry_mintimeout: '10000'
          npm_config_fetch_retry_maxtimeout: '60000'
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund --loglevel=info

      - name: Validar TypeScript
        timeout-minutes: 5
        run: npm run typecheck

      - name: Rodar testes do motor
        timeout-minutes: 10
        run: npm run test:all

      - name: Preparar exportacao estatica para APK
        run: |
          rm -rf out android
          if [ -d src/app/api ]; then
            mv src/app/api src/app/_api_desativada_no_apk
          fi
          if [ -f middleware.ts ]; then
            mv middleware.ts middleware.desativado-no-apk.ts
          fi

      - name: Gerar app web embutido
        timeout-minutes: 10
        env:
          BUILDMASTER_ANDROID_STATIC: '1'
          NEXT_PUBLIC_BUILDMASTER_CLOUD_API_URL: ${{ vars.BUILDMASTER_CLOUD_API_URL || 'https://buildmaster-ai-git-main-buildmaster-ai.vercel.app/api/cloud/fichas' }}
        run: npm run build

      - name: Criar projeto Android
        timeout-minutes: 5
        run: npx --no-install cap add android

      - name: Configurar cache do Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Sincronizar arquivos dentro do APK
        timeout-minutes: 5
        run: npx --no-install cap sync android

      - name: Dar permissao ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK instalavel
        timeout-minutes: 15
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Renomear APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            dist-apk/BuildMaster-Elite-Tatico-v25.72.apk

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: BuildMaster-Elite-Tatico-v25.72-APK-Fiel
          path: dist-apk/BuildMaster-Elite-Tatico-v25.72.apk
          if-no-files-found: error
          retention-days: 14
