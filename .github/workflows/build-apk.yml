name: Gerar APK React Native v1.5 RELEASE OFFLINE

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Mostrar versão do projeto
        run: |
          node -e "const p=require('./package.json'); console.log(p.name, p.version); if(!p.name.includes('v1-5')){ console.error('ERRO: versão antiga no repositório. Apague os arquivos antigos e envie a v1.5.'); process.exit(1); }"
          test -f metro.config.js

      - name: Instalar dependências
        run: npm install --registry=https://registry.npmjs.org/

      - name: Corrigir tsconfig antigo
        run: npm run fix:tsconfig

      - name: Conferir TypeScript
        run: npm run typecheck

      - name: Gerar projeto Android nativo
        run: npx expo prebuild --platform android --clean --no-install

      - name: Embutir JavaScript offline
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --config metro.config.js \
            --reset-cache
          ls -lh android/app/src/main/assets/index.android.bundle

      - name: Gerar APK release offline
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Enviar APK release como artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildmaster-elite-mobile-v1-5-apk-release-offline
          path: android/app/build/outputs/apk/release/*.apk
