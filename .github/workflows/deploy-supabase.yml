name: Publicar contas e licenças no Supabase

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Aplicar banco e Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Conferir Secrets obrigatórios
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$SUPABASE_DB_PASSWORD"

      - name: Vincular projeto Supabase
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Aplicar migrações do banco
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Publicar Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
