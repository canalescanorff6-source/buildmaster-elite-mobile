name: Gerar APK React Native v1.3 SEM ERRO

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Mostrar versão do projeto
        run: |
          node -e "const p=require('./package.json'); console.log(p.name, p.version)"

      - name: Forçar tsconfig limpo
        run: |
          cat > tsconfig.json <<'EOF'
          {
            "extends": "expo/tsconfig.base",
            "compilerOptions": {
              "strict": false,
              "noEmit": true,
              "skipLibCheck": true,
              "jsx": "react-native"
            },
            "include": ["App.tsx", "src/**/*.ts", "src/**/*.tsx"]
          }
          EOF
          cat tsconfig.json

      - name: Instalar dependências
        run: npm install --registry=https://registry.npmjs.org/

      - name: Conferir que não é versão antiga
        run: |
          node -e "const p=require('./package.json'); if(!p.name.includes('v1-3')){ console.error('ERRO: o GitHub ainda está com versão antiga. Apague os arquivos antigos e envie a v1.3.'); process.exit(1) } console.log('Versão correta:', p.name, p.version)"

      - name: Gerar projeto Android nativo
        run: npx expo prebuild --platform android --clean --no-install

      - name: Gerar APK debug instalável
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildmaster-elite-mobile-rn-v1-3-apk-debug
          path: android/app/build/outputs/apk/debug/*.apk
