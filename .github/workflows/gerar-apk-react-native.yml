name: Gerar APK React Native

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm install --registry=https://registry.npmjs.org/

      - name: Conferir TypeScript
        run: npm run typecheck

      - name: Gerar projeto Android nativo
        run: npm run prebuild:android

      - name: Gerar APK debug instalável
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildmaster-elite-mobile-rn-apk-debug
          path: android/app/build/outputs/apk/debug/*.apk
