<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050816" />
    <title>BuildMaster Elite Tático</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #19325e 0, #050816 48%, #02030a 100%);
        color: #f8fafc;
      }
      main {
        width: min(92vw, 420px);
        padding: 28px;
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 24px;
        background: rgba(8, 13, 30, .86);
        box-shadow: 0 24px 80px rgba(0,0,0,.45);
        text-align: center;
      }
      .badge {
        display: inline-block;
        margin-bottom: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(34,211,238,.12);
        color: #67e8f9;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
        font-size: 12px;
      }
      h1 { margin: 0 0 10px; font-size: 26px; }
      p { margin: 0; color: #cbd5e1; line-height: 1.55; }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Elite APK</span>
      <h1>BuildMaster Elite Tático</h1>
      <p>Abrindo o programa. Verifique sua conexão caso a tela demore para carregar.</p>
    </main>
  </body>
</html>
